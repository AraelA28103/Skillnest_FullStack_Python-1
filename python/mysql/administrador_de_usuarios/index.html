<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe Login</title>
    <style>
        /* Fuente que imita el dibujo técnico/manual */
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap');

        body {
            font-family: 'Arial', sans-serif; /* Fuente limpia como la imagen */
            background-color: white;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .container {
            display: flex;
            gap: 100px;
            align-items: flex-start;
        }

        h2 {
            font-size: 32px;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .form-section {
            display: flex;
            flex-direction: column;
        }

        .field {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .field label {
            margin-right: 20px;
            font-size: 18px;
            font-weight: 500;
        }

        /* Caja de texto estilo mano */
        .sketch-input {
            width: 160px;
            height: 35px;
            border: 3px solid black;
            border-radius: 4px 8px 3px 6px; /* Irregular */
            outline: none;
            padding: 5px;
            box-sizing: border-box;
        }

        /* Botón con sombra pesada */
        .btn-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
            padding-right: 10px;
        }

        button {
            background: white;
            border: 3px solid black;
            padding: 8px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            /* Sombra sólida igual a la imagen */
            box-shadow: 6px 6px 0px black;
            border-radius: 2px;
        }

        button:active {
            transform: translate(2px, 2px);
            box-shadow: 4px 4px 0px black;
        }

        /* Ajuste específico para la sección de registro */
        .registro-section {
            margin-left: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="form-section">
            <h2>Inicio de Sesión</h2>
            <div class="field">
                <label>E-mail</label>
                <input type="text" class="sketch-input">
            </div>
            <div class="field">
                <label>Contraseña</label>
                <input type="password" class="sketch-input">
            </div>
            <div class="btn-container">
                <button>Iniciar Sesión</button>
            </div>
        </div>

        <div class="form-section registro-section">
            <h2>Registro</h2>
            <div class="field">
                <label>Nombre</label>
                <input type="text" class="sketch-input">
            </div>
            <div class="field">
                <label>E-mail</label>
                <input type="text" class="sketch-input">
            </div>
            <div class="field">
                <label>Contraseña</label>
                <input type="password" class="sketch-input">
            </div>
            <div class="field">
                <label>Conf. Contraseña</label>
                <input type="password" class="sketch-input">
            </div>
            <div class="btn-container">
                <button>Registrar</button>
            </div>
        </div>

    </div>

</body>
</html>
