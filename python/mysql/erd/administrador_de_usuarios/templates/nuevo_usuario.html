<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe - Nuevo Usuario</title>
    <link rel="stylesheet" href="../static/css/nuevo_usuario.css">
</head>
<body>

    <div class="content">
        <h1 class="page-title">Nuevo Usuario</h1>
        
        <div class="form-container">
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" class="sketch-input">
            </div>
            
            <div class="form-group">
                <label>E-mail</label>
                <input type="text" class="sketch-input">
            </div>
            
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" class="sketch-input">
            </div>
            
            <div class="form-group">
                <label>Conf. Contraseña</label>
                <input type="password" class="sketch-input">
            </div>
            
            <div class="form-group" style="align-items: flex-start;">
                <label style="margin-top: 5px;">Tipo de Usuario</label>
                <div class="select-container">
                    <div class="custom-select">
                        <span class="select-text">Administrador</span>
                        <div class="select-arrow">&#9660;</div>
                    </div>
                    <div class="select-option-down">
                        <span>Usuario</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="btn-container">
            <button>Crear</button>
        </div>
    </div>

</body>
</html>
